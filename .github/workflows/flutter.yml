name: Flutter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.6'

      - name: Obtener dependencias
        run: cd academic_check/academic_check && flutter pub get

      - name: Ejecutar pruebas
        run: cd academic_check/academic_check && flutter test

      - name: Generar APK Release
        run: cd academic_check/academic_check && flutter build apk --release

      - name: Crear Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: academic_check/academic_check/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
